<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live AI Object Detection Dashboard — Real-time YOLO detections powered by Supabase" />
  <title>AI Detection Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo-icon" id="logo-pulse">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3"/>
          <line x1="12" y1="2" x2="12" y2="6"/>
          <line x1="12" y1="18" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="6" y2="12"/>
          <line x1="18" y1="12" x2="22" y2="12"/>
        </svg>
      </div>
      <h1>AI Detection <span class="accent">Dashboard</span></h1>
    </div>
    <div class="header-right">
      <div class="status-badge" id="status-badge">
        <span class="status-dot"></span>
        <span id="status-text">Connecting...</span>
      </div>
      <span class="last-update" id="last-update">—</span>
    </div>
  </header>

  <!-- Stats Cards -->
  <section class="stats-grid" id="stats-grid">
    <div class="stat-card" id="stat-total">
      <div class="stat-icon stat-icon-total">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="total-count">—</span>
        <span class="stat-label">Total Detections</span>
      </div>
    </div>
    <div class="stat-card" id="stat-unique">
      <div class="stat-icon stat-icon-unique">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="unique-count">—</span>
        <span class="stat-label">Unique Objects</span>
      </div>
    </div>
    <div class="stat-card" id="stat-confidence">
      <div class="stat-icon stat-icon-confidence">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="avg-confidence">—</span>
        <span class="stat-label">Avg Confidence</span>
      </div>
    </div>
    <div class="stat-card" id="stat-latest">
      <div class="stat-icon stat-icon-latest">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="stat-info">
        <span class="stat-value" id="latest-object">—</span>
        <span class="stat-label">Latest Detection</span>
      </div>
    </div>
  </section>

  <!-- Detection Table -->
  <section class="table-section">
    <div class="table-header">
      <h2>Recent Detections</h2>
      <button class="refresh-btn" id="refresh-btn" title="Refresh now">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
    </div>

    <div class="table-container" id="table-container">
      <!-- Loading state -->
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Loading detections...</p>
      </div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" style="display:none;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>No detections yet</p>
        <span>Run <code>python detect.py</code> to start detecting objects</span>
      </div>

      <!-- Table -->
      <table class="detection-table" id="detection-table" style="display:none;">
        <thead>
          <tr>
            <th>#</th>
            <th>Object</th>
            <th>Confidence</th>
            <th>Detected At</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </section>

  <footer class="footer">
    <p>Camera → YOLO AI → Supabase DB → Dashboard</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
